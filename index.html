<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Platform Buddy v2 mobile-first powerlifting training cockpit." />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./src/styles.css" />
    <title>Platform Buddy v2</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar" aria-label="App header">
        <div>
          <p class="eyebrow">Platform Buddy v2</p>
          <h1>Training Cockpit</h1>
        </div>
        <div class="status-pill" aria-label="Current mode">Calm</div>
      </header>

      <main id="app" class="screen" tabindex="-1"></main>

      <nav class="bottom-nav" aria-label="Primary navigation">
        <button class="nav-item is-active" type="button" data-view="home" aria-current="page">HOME</button>
        <button class="nav-item" type="button" data-view="log">LOG</button>
        <button class="nav-item" type="button" data-view="plan">PLAN</button>
        <button class="nav-item" type="button" data-view="data">DATA</button>
        <button class="nav-item" type="button" data-view="meet">MEET</button>
      </nav>
    </div>

    <script src="./src/main.js" type="module"></script>
  </body>
</html>
